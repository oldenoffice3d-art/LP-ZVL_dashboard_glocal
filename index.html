<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiPark: ZVL Global Dashboard</title>
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config for custom LogiPark settings -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0A1128',
                        safety: '#FF9F1C',
                        grid: '#2B2D42',
                        emerald: '#10b981',
                        blue: '#3b82f6',
                        purple: '#a855f7'
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0A1128; font-family: 'Inter', sans-serif; }
        
        /* Range slider styling to match Industrial Futurism */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            background: #FF9F1C;
            cursor: pointer;
            margin-top: -6px;
            border-radius: 2px;
            transition: all 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 159, 28, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #2B2D42;
            border-radius: 2px;
        }
        
        /* Hide number input spinners for clean Industrial UI */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .glass-panel {
            background: rgba(43, 45, 66, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 159, 28, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVG Icons
        const Calculator = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="18" y2="18"/></svg>);
        const DollarSign = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>);
        const PoundSign = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 7c0-5.333-8-5.333-8 0"/><path d="M10 7v14"/><path d="M6 21h12"/><path d="M6 13h10"/></svg>);
        const TrendingDown = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>);
        const Leaf = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20A7 7 0 0 1 14 6h7v7a7 7 0 0 1-7 7H11Z"/><path d="M11 20c-1.66 0-3-1.34-3-3s1.34-3 3-3"/><path d="M2 12c0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3-3-1.34-3-3Z"/></svg>);
        const Target = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>);
        const Users = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
        const EyeOff = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>);

        function ZvlDashboard() {
            // Tab State
            const [activeTab, setActiveTab] = useState('USA');

            // --- BASELINES (OSINT 2026 LOGISTICS STANDARDS) ---
            const USA_BASELINE = {
                hubs: 250, 
                docksPerHub: 100, 
                trucksPerHub: 800, // Враховуючи інтенсивність Tier-1 Relay
                avgDemurrageCost: 95.00, // Інфляція + дефіцит водіїв
                idleTimeMinutes: 210, // Сумарно в'їзд + очікування
                undetectedFriction: 0.28, // 28% сліпих зон у Legacy YMS
                workersPerDock: 2, 
                warehouseWage: 24.50, // Актуальна ставка
                eldCost: 550, 
                hubCapex: 145000,
                peakIntensity: 1.4 // Коефіцієнт Prime Day / Q4 Peak
            };

            const UK_BASELINE = {
                hubs: 42, 
                docksPerHub: 65, 
                trucksPerHub: 450,
                avgDemurrageCost: 75.00,
                idleTimeMinutes: 240, 
                undetectedFriction: 0.32,
                workersPerDock: 2, 
                warehouseWage: 17.80, 
                eldCost: 450, 
                hubCapex: 110000,
                peakIntensity: 1.5
            };

            // INDEPENDENT STATES
            const [usData, setUsData] = useState(USA_BASELINE);
            const [ukData, setUkData] = useState(UK_BASELINE);

            // Select active data set based on region
            const currentData = activeTab === 'USA' ? usData : ukData;
            const setData = activeTab === 'USA' ? setUsData : setUkData;

            // Universal Handlers
            const handleRegionChange = (newRegion) => {
                setActiveTab(newRegion);
            };

            const handleChange = (field, value) => {
                setData(prev => ({ ...prev, [field]: value }));
            };

            const resetToBaseline = () => {
                setData(activeTab === 'USA' ? USA_BASELINE : UK_BASELINE);
            };

            // Currency formatting logic
            const currencySymbol = activeTab === 'USA' ? '$' : '£';
            const currencyCode = activeTab === 'USA' ? 'USD' : 'GBP';
            const localeCode = activeTab === 'USA' ? 'en-US' : 'en-GB';

            const formatCurrency = (value) => new Intl.NumberFormat(localeCode, { style: 'currency', currency: currencyCode, minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value);
            const formatNumber = (value) => new Intl.NumberFormat(localeCode, { maximumFractionDigits: 0 }).format(value);

            // ----------------------------------------------------------------
            // CORE MATH ENGINE (INCLUDES PEAK MULTIPLIER & SHADOW PILOT HOOK)
            // ----------------------------------------------------------------
            const calculateROI = (data, region) => {
                const WORKING_DAYS = 300;
                const PEAK_DAYS = 65; // Black Friday, Holidays, Prime Day
                
                // Regional Constants
                let fuelBurnRate, co2EmissionFactor, fuelPrice, carbonCreditPrice;

                if (region === 'USA') {
                    fuelBurnRate = 0.8; 
                    co2EmissionFactor = 0.0101; 
                    fuelPrice = 4.00; 
                    carbonCreditPrice = 32.80; 
                } else {
                    fuelBurnRate = 3.41; 
                    co2EmissionFactor = 0.002626; 
                    fuelPrice = 1.45; 
                    carbonCreditPrice = 49.41; 
                }

                const totalTrucksDaily = data.hubs * data.trucksPerHub;
                const totalNetworkDocks = data.hubs * data.docksPerHub;
                const turnsPerDockDaily = (data.trucksPerHub / data.docksPerHub).toFixed(1);
                
                // Weighted Demurrage Calculation (Peak Season adjustment)
                const baseHourlyCost = data.avgDemurrageCost;
                const peakHourlyCost = baseHourlyCost * data.peakIntensity;
                const annualWeightedDemurrage = ((baseHourlyCost * WORKING_DAYS) + (peakHourlyCost * PEAK_DAYS)) / (WORKING_DAYS + PEAK_DAYS);
                
                // Base Efficiency Algorithm (LogiPark eliminates 80% of visible variance)
                const totalOperatingDays = WORKING_DAYS + PEAK_DAYS;
                const hoursSavedYearly = (totalTrucksDaily * totalOperatingDays) * (data.idleTimeMinutes / 60) * 0.8;
                const visibleDemurrageSaved = hoursSavedYearly * annualWeightedDemurrage;

                // NEW: Shadow Pilot Detection (The Hook)
                const shadowPilotSurplus = visibleDemurrageSaved * data.undetectedFriction;
                const totalDemurrageSavedYearly = visibleDemurrageSaved + shadowPilotSurplus;

                // Labor Savings
                const laborHoursSavedYearly = hoursSavedYearly * data.workersPerDock;
                const laborCostSavedYearly = laborHoursSavedYearly * data.warehouseWage;

                // ESG Calculations
                const fuelSavedUnits = hoursSavedYearly * fuelBurnRate;
                const fuelCostSaved = fuelSavedUnits * fuelPrice;
                const co2ReducedTons = fuelSavedUnits * co2EmissionFactor;
                const carbonCreditsValue = co2ReducedTons * carbonCreditPrice;
                const esgYield = fuelCostSaved + carbonCreditsValue;

                // CAPEX Avoided
                const hubCapexAvoided = data.hubs * data.hubCapex;
                const truckCapexAvoided = totalTrucksDaily * data.eldCost; 
                const totalCapexAvoided = hubCapexAvoided + truckCapexAvoided;

                // Total Operator Yield
                const totalYield = totalDemurrageSavedYearly + laborCostSavedYearly + esgYield + totalCapexAvoided;

                return {
                    totalNetworkDocks, turnsPerDockDaily, totalTrucksDaily,
                    visibleDemurrageSaved, shadowPilotSurplus, totalDemurrageSavedYearly, 
                    laborCostSavedYearly, esgYield, co2ReducedTons,
                    totalCapexAvoided, totalYield
                };
            };

            const metrics = calculateROI(currentData, activeTab);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center selection:bg-safety selection:text-navy">
                
                {/* Header & Regional Toggle */}
                <div className="w-full max-w-6xl border-b-2 border-safety/30 pb-6 mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                    <div>
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-10 h-10 bg-safety text-navy rounded-lg flex items-center justify-center font-black text-xl">ZVL</div>
                            <h1 className="text-3xl md:text-4xl font-black tracking-tighter text-white">
                                ZERO-VARIANCE <span className="text-safety">LOGISTICS</span>
                            </h1>
                        </div>
                        <p className="text-xs text-gray-400 uppercase tracking-[0.3em] font-bold">Executive Yield Model</p>
                        <div className="flex gap-2 mt-3">
                            <span className="inline-block text-[10px] bg-grid text-safety px-2 py-1 uppercase tracking-widest border border-safety/30 font-mono">
                                Baseline: OSINT Tier-1 {activeTab} (2026)
                            </span>
                        </div>
                    </div>
                    
                    <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                        {/* REGION TOGGLE */}
                        <div className="flex bg-grid p-1 border border-safety/30 rounded-lg w-full md:w-auto">
                            <button 
                                onClick={() => handleRegionChange('USA')} 
                                className={`flex-1 px-6 py-2 text-xs font-black uppercase transition-all rounded-md ${activeTab === 'USA' ? 'bg-safety text-navy shadow-lg shadow-safety/20' : 'text-gray-400 hover:text-white'}`}>
                                🇺🇸 USA ($)
                            </button>
                            <button 
                                onClick={() => handleRegionChange('UK')} 
                                className={`flex-1 px-6 py-2 text-xs font-black uppercase transition-all rounded-md ${activeTab === 'UK' ? 'bg-safety text-navy shadow-lg shadow-safety/20' : 'text-gray-400 hover:text-white'}`}>
                                🇬🇧 UK (£)
                            </button>
                        </div>
                    </div>
                </div>

                <div className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
                    
                    {/* LEFT COLUMN: INPUT PANEL */}
                    <div className="col-span-1 lg:col-span-4 space-y-6">
                        <div className="glass-panel p-6 rounded-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-1.5 h-full bg-safety"></div>
                            
                            {/* Header with Reset Button */}
                            <div className="flex items-center justify-between mb-6 border-b border-white/10 pb-4">
                                <div className="flex items-center space-x-2">
                                    <Target className="w-5 h-5 text-safety" />
                                    <h2 className="text-sm font-black tracking-widest uppercase text-safety">{activeTab} Network Scale</h2>
                                </div>
                                <button onClick={resetToBaseline} className="text-[10px] text-safety border border-safety/30 rounded px-2 py-1 uppercase tracking-widest transition-colors hover:bg-safety hover:text-navy font-bold">
                                    ↺ Reset
                                </button>
                            </div>

                            <div className="space-y-6">
                                {/* Physical Scale Input */}
                                <div className="space-y-4">
                                    <div>
                                        <label className="flex justify-between text-[10px] text-gray-400 uppercase font-bold mb-1">
                                            <span>Active Hubs (FCs)</span>
                                            <span className="text-safety">{currentData.hubs}</span>
                                        </label>
                                        <input type="range" min="1" max={activeTab === 'USA' ? 500 : 100} value={currentData.hubs} onChange={(e) => handleChange('hubs', Number(e.target.value))} />
                                    </div>
                                    <div>
                                        <label className="flex justify-between text-[10px] text-gray-400 uppercase font-bold mb-1">
                                            <span>Docks per Hub</span>
                                            <span className="text-safety">{currentData.docksPerHub}</span>
                                        </label>
                                        <input type="range" min="10" max={activeTab === 'USA' ? 300 : 150} value={currentData.docksPerHub} onChange={(e) => handleChange('docksPerHub', Number(e.target.value))} />
                                    </div>
                                    <div>
                                        <label className="flex justify-between text-[10px] text-gray-400 uppercase font-bold mb-1">
                                            <span>Trucks / Hub / Day</span>
                                            <span className="text-safety">{currentData.trucksPerHub}</span>
                                        </label>
                                        <input type="range" min="50" max={activeTab === 'USA' ? 2500 : 1000} value={currentData.trucksPerHub} onChange={(e) => handleChange('trucksPerHub', Number(e.target.value))} />
                                    </div>
                                </div>

                                <div className="p-3 bg-navy/50 border border-white/5 rounded-xl flex justify-between items-center">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">Network Nodes</span>
                                    <span className="font-mono text-lg font-bold text-white">{formatNumber(metrics.totalTrucksDaily)}</span>
                                </div>

                                <div className="border-t border-white/10"></div>

                                {/* Economic Friction Input */}
                                <div className="space-y-4">
                                    <div className="flex gap-4">
                                        <div className="w-1/2">
                                            <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Base Demurrage</label>
                                            <div className="flex items-center font-mono font-bold border-b border-safety/30 focus-within:border-safety">
                                                <span className="text-safety">{currencySymbol}</span>
                                                <input type="number" value={currentData.avgDemurrageCost} onChange={(e) => handleChange('avgDemurrageCost', Number(e.target.value))} className="w-full bg-transparent text-white px-1 outline-none" />
                                            </div>
                                        </div>
                                        <div className="w-1/2">
                                            <label className="block text-[10px] text-gray-400 uppercase font-bold mb-1">Avg Idle Time</label>
                                            <div className="flex items-center font-mono font-bold border-b border-safety/30 focus-within:border-safety">
                                                <input type="number" value={currentData.idleTimeMinutes} onChange={(e) => handleChange('idleTimeMinutes', Number(e.target.value))} className="w-full bg-transparent text-white px-1 outline-none" />
                                                <span className="text-safety text-[10px]">MIN</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Peak Multiplier */}
                                    <div>
                                        <label className="flex justify-between text-[10px] text-purple-400 uppercase font-bold mb-1">
                                            <span>Peak Season Multiplier</span>
                                            <span className="text-white">{currentData.peakIntensity}x</span>
                                        </label>
                                        <input type="range" min="1.0" max="3.0" step="0.1" value={currentData.peakIntensity} onChange={(e) => handleChange('peakIntensity', Number(e.target.value))} />
                                        <p className="text-[9px] text-gray-500 mt-1 uppercase">Adjusts cost for Prime Day / Q4</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* RIGHT COLUMN: OUTPUT PANEL */}
                    <div className="col-span-1 lg:col-span-8 space-y-6">

                        {/* Total Operational Yield */}
                        <div className="glass-panel p-6 md:p-8 rounded-3xl relative flex items-center justify-between border-safety/30 shadow-[0_0_30px_rgba(255,159,28,0.05)]">
                            <div>
                                <p className="text-xs text-safety uppercase tracking-[0.2em] font-black mb-2 flex items-center gap-2">
                                    <DollarSign className="w-4 h-4" /> Client Recovery (Year 1)
                                </p>
                                <p className="text-4xl md:text-5xl font-black text-safety font-mono tracking-tighter">
                                    {formatCurrency(metrics.totalYield)}
                                </p>
                            </div>
                            <div className="hidden md:block text-right">
                                <p className="text-[10px] text-gray-500 uppercase font-bold">Hard Savings + Avoided Costs</p>
                            </div>
                        </div>

                        {/* Detailed Metrics Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            {/* Undetected Friction (Shadow Pilot) */}
                            <div className="glass-panel p-6 rounded-2xl border-l-4 border-l-blue-500 hover:bg-white/5 transition-all">
                                <div className="flex justify-between items-start mb-4">
                                    <EyeOff className="w-6 h-6 text-blue-400" />
                                    <span className="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 uppercase font-bold rounded">Shadow Pilot Hook</span>
                                </div>
                                <div>
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-1">Undetected Friction ({(currentData.undetectedFriction * 100).toFixed(0)}%)</p>
                                    <p className="text-2xl font-black font-mono text-white">{formatCurrency(metrics.shadowPilotSurplus)}</p>
                                    <p className="text-[10px] text-gray-500 mt-2 leading-relaxed">Losses invisible to legacy YMS. Revealed exclusively by LogiPark BYOD sensors.</p>
                                </div>
                            </div>

                            {/* Legacy Friction */}
                            <div className="glass-panel p-6 rounded-2xl border border-white/5 hover:bg-white/5 transition-all">
                                <div className="flex justify-between items-start mb-4">
                                    <TrendingDown className="w-6 h-6 text-gray-400" />
                                    <span className="text-[10px] bg-white/10 text-gray-300 px-2 py-1 uppercase font-bold rounded">DLR Algorithm</span>
                                </div>
                                <div>
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-1">Visible Demurrage Saved</p>
                                    <p className="text-2xl font-black font-mono text-white">{formatCurrency(metrics.visibleDemurrageSaved)}</p>
                                    <p className="text-[10px] text-gray-500 mt-2 leading-relaxed">Eliminated through predictive Hot-Swaps and Virtual Buffering.</p>
                                </div>
                            </div>

                            {/* Idle Labor */}
                            <div className="glass-panel p-6 rounded-2xl border border-white/5 hover:bg-white/5 transition-all">
                                <div className="flex justify-between items-start mb-4">
                                    <Users className="w-6 h-6 text-gray-400" />
                                </div>
                                <div>
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-1">Idle Labor Recovered</p>
                                    <p className="text-2xl font-black font-mono text-white">{formatCurrency(metrics.laborCostSavedYearly)}</p>
                                    <p className="text-[10px] text-gray-500 mt-2">Based on {currentData.workersPerDock} workers waiting at {currencySymbol}{currentData.warehouseWage.toFixed(2)}/hr.</p>
                                </div>
                            </div>

                            {/* CAPEX + ESG Combined */}
                            <div className="glass-panel p-6 rounded-2xl border-l-4 border-l-emerald-500 hover:bg-white/5 transition-all">
                                <div className="flex justify-between items-start mb-4">
                                    <Leaf className="w-6 h-6 text-emerald-400" />
                                    <span className="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 uppercase font-bold rounded">Capital & ESG</span>
                                </div>
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">CAPEX Deferred</p>
                                        <p className="text-lg font-black font-mono text-white">{formatCurrency(metrics.totalCapexAvoided)}</p>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">ESG Yield</p>
                                        <p className="text-lg font-black font-mono text-emerald-400">{formatCurrency(metrics.esgYield)}</p>
                                    </div>
                                    <p className="text-[10px] text-emerald-500/70 mt-3 font-bold border-t border-white/5 pt-2">
                                        {formatNumber(metrics.co2ReducedTons)} Tons CO₂ reduced annually.
                                    </p>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                {/* Footer */}
                <div className="w-full max-w-6xl mt-16 pt-6 border-t border-white/10 flex justify-between items-center text-[9px] text-gray-600 uppercase font-mono tracking-widest">
                    <p>LogiPark Technologies Ltd. | Intellectual Property Protected</p>
                    <p className="text-safety">Zero-Variance Logistics Protocol</p>
                </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZvlDashboard />);
    </script>
</body>
</html>
